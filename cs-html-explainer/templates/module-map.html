<!--
  Template: module-map
  Mode kicker: MAPA DE MÓDULO  (or MODULE MAP)

  Use this scaffold for codebase/module explanation, service ownership maps,
  dependency maps, and onboarding pages.

  Scaffold: copy templates/base-page.html and apply the deltas below.
  This mode uses the SINGLE-COLUMN hero, an OVERSIZED entry-points band, and
  the SIGNATURE asymmetric layout: a sticky file-tree column on the left and a
  wide content column on the right.

  See: ../design/editorial-obsidian.md for tokens and visual rules.

  ============================================================
  HERO SHAPE — single column with eyebrow-row + 4-column ledger
  ============================================================

    <section class="hero" style="grid-template-columns: 1fr;">
      <div>
        <div class="eyebrow-row">
          <span class="kicker">Mapa de módulo</span>
          <span class="rule"></span>
          <span class="id">M-{{NUM}} · {{DATE}}</span>
        </div>
        <h1>Como o módulo de {{NOME}} <em>{{VERBO}}</em> por dentro.</h1>
        <p class="subtitle">
          Um mapa de onboarding pra quem vai mexer no código:
          <strong>onde estão as entradas</strong>, como os arquivos se relacionam,
          o que é seguro mudar e o que pode quebrar.
        </p>
        <div class="hero-meta">
          <div class="item"><span class="k">Status</span><span class="v">Estável</span></div>
          <div class="item"><span class="k">Owner</span><span class="v">{{SQUAD}}</span></div>
          <div class="item"><span class="k">Entry points</span><span class="v">{{N}}</span></div>
          <div class="item"><span class="k">Stack</span><span class="v">{{STACK}}</span></div>
        </div>
      </div>
    </section>

  Reuse the .eyebrow-row tokens from architecture-decision.html.

  ============================================================
  MANDATORY SECTIONS (in order)
  ============================================================

    1. Masthead + Hero
    2. TL;DR paper band (.tldr-paper)
    3. Entry points band (MANDATORY — see signature)
    4. Body grid (sticky tree + wide content) — MANDATORY layout signature
         Sections inside the right column:
           a. Visão do módulo            (prose)
           b. Diretórios principais       (.dir-grid two-up)
           c. Principais abstrações       (.abstractions list)
           d. Dependências                (table.editorial OR .flow — never both)
           e. Fluxo de dados              (.flow)
           f. Pontos de extensão          (.checklist)
           g. Mudanças comuns             (table.editorial: quero | edite | rode)
           h. Riscos / dívidas            (.hairline-grid with .status warning/danger)
           i. Estratégia de testes        (prose + .checklist)

  ============================================================
  MODE-SPECIFIC SIGNATURES — do not skip
  ============================================================

  (A) Entry points band — oversized Playfair italic-lime list. NOT pill buttons.

    <section class="entry-band">
      <div class="head">
        <span class="label">Entry points</span>
        <h2>Por onde se entra no módulo</h2>
        <span class="right">3 entradas · 2 públicas · 1 interna</span>
      </div>

      <ul class="entry-list">
        <li>
          <span class="idx">I</span>
          <a href="#" class="entry"><em>POST</em>/api/charges</a>
          <span class="desc">Cria uma cobrança nova a partir de um pedido confirmado.</span>
        </li>
        <li>
          <span class="idx">II</span>
          <a href="#" class="entry"><em>worker</em>charges.consumer</a>
          <span class="desc">Consome eventos da fila para retentativa e baixa automática.</span>
        </li>
        <li>
          <span class="idx">III</span>
          <a href="#" class="entry muted-link"><em>POST</em>/api/charges/:id/cancel</a>
          <span class="desc">Cancela uma cobrança pendente. Disponível só para roles internas.</span>
        </li>
      </ul>
    </section>

    Styles:
      .entry-band { max-width: var(--max-content); margin: 0 auto;
        padding: 0 var(--gutter) clamp(48px, 6vw, 96px); }
      .entry-band .head { display: flex; align-items: baseline; gap: 18px;
        padding-bottom: var(--space-md); border-bottom: 1px solid var(--hairline-strong);
        margin-bottom: var(--space-md); }
      .entry-band .head .label { font-family: var(--font-sans); font-size: 10px;
        font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--text-meta); }
      .entry-band .head h2 { font-family: var(--font-serif); font-weight: 400;
        font-size: clamp(28px, 3vw, 44px); letter-spacing: -0.02em;
        line-height: 1; margin: 0; }
      .entry-band .head .right { margin-left: auto; font-family: var(--font-mono);
        font-size: 11px; color: var(--text-meta); letter-spacing: 0.06em; }

      .entry-list { list-style: none; padding: 0; margin: 0; }
      .entry-list li { display: grid; grid-template-columns: 60px 1fr auto;
        gap: clamp(16px, 3vw, 48px); padding: clamp(24px, 3vw, 36px) 0;
        border-bottom: 1px solid var(--hairline-alpha); align-items: baseline; }
      .entry-list li:last-child { border-bottom: none; }
      .entry-list .idx { font-family: var(--font-mono); font-size: 11px;
        color: var(--text-meta); letter-spacing: 0.06em; }
      .entry-list .entry { font-family: var(--font-serif); font-weight: 400;
        font-size: clamp(28px, 3.4vw, 44px); letter-spacing: -0.02em;
        line-height: 1.1; color: var(--text); border: none;
        transition: color 0.25s ease; }
      .entry-list .entry:hover { color: var(--accent-lime); border: none; }
      .entry-list .entry em { font-style: italic; color: var(--accent-lime);
        font-weight: 400; font-size: 0.85em; margin-right: 4px; }
      .entry-list .muted-link { color: var(--text-muted); }
      .entry-list .muted-link em { color: var(--text-muted); }
      .entry-list .desc { font-family: var(--font-sans); font-size: 14px;
        color: var(--text-muted); max-width: 36ch; text-align: right; line-height: 1.5; }

  (B) Body grid — STICKY tree column + wide content column.

    <section class="body-grid">
      <aside class="tree-rail">
        <div class="tag">
          Mapa de arquivos
          <span class="right">src/</span>
        </div>
        <h3>Estrutura do módulo</h3>
        <pre class="code tree"><span class="dir">src/</span>
├── <span class="dir">api/</span>
│   ├── charges.ts        <span class="note"># rotas HTTP</span>
│   └── webhooks.ts       <span class="note"># callbacks</span>
├── <span class="dir">domain/</span>
│   ├── charge.ts         <span class="note"># agregado</span>
│   └── <span class="dir">policies/</span>
└── <span class="dir">infra/</span>
        </pre>
      </aside>

      <div class="body-main">
        <section class="section" id="intro"> ... </section>
        <section class="section" id="dirs"> ... </section>
        ...
      </div>
    </section>

    Styles:
      .body-grid { max-width: var(--max-content); margin: 0 auto;
        padding: 0 var(--gutter) var(--space-2xl);
        display: grid; grid-template-columns: 320px 1fr;
        gap: clamp(40px, 5vw, 80px); align-items: start; }
      .tree-rail { position: sticky; top: 96px; }
      .tree-rail .tag { font-family: var(--font-sans); font-size: 10px;
        font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--text-meta); margin-bottom: var(--space-sm);
        padding-bottom: 12px; border-bottom: 1px solid var(--hairline-strong); }
      .tree-rail .tag .right { float: right; font-family: var(--font-mono);
        color: var(--text-meta); letter-spacing: 0.04em; }
      .tree-rail h3 { font-family: var(--font-serif); font-weight: 500;
        font-size: 22px; letter-spacing: -0.01em;
        margin: 0 0 var(--space-md); color: var(--text); }
      .body-main { min-width: 0; }
      @media (max-width: 1100px) {
        .body-grid { grid-template-columns: 1fr; }
        .tree-rail { position: static; }
      }

    The .code.tree variant uses .dir (lime) and .note (italic meta) tokens
    already defined in base-page.html. The 4px moss left bar identifies it as
    code.

  (C) Inside the right column, sections use a SIMPLIFIED variant of the
      marginalia pattern — short eyebrow line + h2, no marginalia rail.

    <section class="section" id="intro">
      <div class="eyebrow">
        <span class="num">01</span>
        Visão do módulo
      </div>
      <h2>Hexagonal — sem cerimônia.</h2>
      <div class="prose"> ... </div>
    </section>

    Styles:
      .body-main .section { padding: 0 0 clamp(48px, 6vw, 96px);
        border-bottom: 1px solid var(--hairline-alpha);
        margin-bottom: clamp(48px, 6vw, 96px);
        display: block; }   /* override the marginalia grid */
      .body-main .section:last-child { border-bottom: none; margin-bottom: 0; }
      .body-main .section .eyebrow { display: flex; align-items: baseline;
        gap: 12px; font-family: var(--font-sans); font-size: 10px;
        font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
        color: var(--text-meta); margin-bottom: var(--space-sm);
        padding-bottom: 10px; border-bottom: 1px solid var(--hairline-alpha); }
      .body-main .section .eyebrow .num { font-family: var(--font-serif);
        font-style: italic; font-size: 20px; color: var(--text);
        letter-spacing: -0.01em; }

  (D) Directory grid — annotation cards using mono headers in lime.

    <div class="dir-grid">
      <article>
        <h3>api/</h3>
        <p>Camada HTTP fina. Faz validação de entrada e tradução para use case.</p>
      </article>
      ...
    </div>

    Styles:
      .dir-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px;
        background: var(--hairline-strong); border: 1px solid var(--hairline-strong); }
      .dir-grid > article { background: var(--bg); padding: var(--space-md); }
      .dir-grid h3 { font-family: var(--font-mono); font-size: 14px;
        color: var(--accent-lime); margin: 0 0 var(--space-sm);
        font-weight: 400; letter-spacing: 0.02em; }
      .dir-grid p { font-family: var(--font-sans); font-size: 14px;
        color: var(--text-muted); margin: 0; max-width: 42ch; line-height: 1.6; }

  (E) Abstractions — two-column hairline list (title-italic | description-muted).

    <div class="abstractions">
      <div class="abstraction">
        <h3>Agregado Charge</h3>
        <p>Encapsula estado e transições válidas...</p>
      </div>
      ...
    </div>

    Styles:
      .abstractions { display: grid; gap: 0; }
      .abstraction { padding: var(--space-md) 0; border-top: 1px solid var(--hairline-alpha);
        display: grid; grid-template-columns: 220px 1fr;
        gap: var(--space-md); align-items: baseline; }
      .abstraction:last-child { border-bottom: 1px solid var(--hairline-alpha); }
      .abstraction h3 { font-family: var(--font-serif); font-weight: 500;
        font-style: italic; font-size: 22px; margin: 0;
        letter-spacing: -0.01em; color: var(--text); }
      .abstraction p { margin: 0; font-family: var(--font-sans); font-size: 15px;
        color: var(--text-muted); max-width: 52ch; line-height: 1.6; }

  ============================================================
  STATUS BADGE USAGE
  ============================================================

    - .status.danger   → RISCO ALTO (hot-spot, código frágil, webhook não idempotente)
    - .status.warning  → ATENÇÃO    (dívida técnica conhecida)
    - .status.success  → OK         (estável, coberto por testes — sparingly)

  ============================================================
  LIME BUDGET (max 5 per page) — TIGHT IN THIS MODE
  ============================================================

  Entry points consume lime fast. Be strict:

    1. The H1 <em>                                  (the navigational verb)
    2. The .cta primary in the masthead
    3. The .kicker inside .eyebrow-row
    4. The entry-list <em> tags  (CAP at 2 lime entries — the third entry uses
       .muted-link and renders the <em> in --text-muted instead of lime)
    5. The .dir-grid h3 mono labels — these are lime, count them in the budget.
       If the budget runs out before the dir-grid, render the h3 in --text instead.

  Dependencies rule (the hard one):
    - You may render dependencies as EITHER a horizontal .flow OR a table.editorial — NEVER both.
    - If choosing .flow: max 5 nodes, arrows in --accent-moss, no lime.
    - If choosing table: 3 columns (Dependência | Tipo | Crítica para).

  Footer footnote attribution stays fixed:
    Editorial Obsidian — cs-html-explainer
-->
